<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loci — AI Memory</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      background: #0d0e14;
      color: #ffffff;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      margin: 0;
    }

    /* ── Scrollbars ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.2); border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,0.35); }

    /* ── Design tokens ──────────────────────────────────────────── */
    :root {
      --bg-base:      #0d0e14;
      --bg-sidebar:   #0a0b11;
      --bg-surface:   #13141c;
      --bg-raised:    #1a1b26;
      --bg-input:     #0a0a12;
      --bg-hover:     rgba(245,158,11,0.06);
      --border:       #1e1f2e;
      --border-md:    #2a2a40;
      --border-amber: rgba(245,158,11,0.4);
      --text-1:       #ffffff;
      --text-2:       #8888aa;
      --text-3:       #555577;
      --accent:       #f59e0b;
      --accent-hi:    #fbbf24;
      --accent-dim:   rgba(245,158,11,0.1);
      --success:      #10b981;
      --success-hi:   #34d399;
      --error:        #f87171;
      --warn:         #fbbf24;
    }

    /* ── Keyframes ──────────────────────────────────────────────── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin-smooth { to { transform: rotate(360deg); } }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
    @keyframes amber-glow {
      0%, 100% { box-shadow: 0 0 12px rgba(245,158,11,0.25); }
      50%       { box-shadow: 0 0 24px rgba(245,158,11,0.45); }
    }

    /* ── Utilities ──────────────────────────────────────────────── */
    .animate-fade-up      { animation: fade-up 0.28s ease both; }
    .animate-fade-up-late { animation: fade-up 0.28s 0.06s ease both; }
    .spin                 { animation: spin-smooth 0.75s linear infinite; }
    .cursor-blink::after  {
      content: '▋'; margin-left: 1px;
      animation: blink 1.1s step-end infinite;
    }

    /* ── Cards ──────────────────────────────────────────────────── */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .card-raised {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* ── Inputs — opaque dark, no white bleed ever ──────────────── */
    .inp {
      display: block;
      background: var(--bg-input) !important;
      border: 1px solid var(--border-md) !important;
      color: var(--text-1) !important;
      border-radius: 8px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }
    .inp:focus {
      border-color: rgba(245,158,11,0.55) !important;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.08);
    }
    .inp::placeholder { color: #444466 !important; }

    /* ── Primary button — amber gradient ────────────────────────── */
    .btn-primary {
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 60%, #fbbf24 100%);
      color: #0d0e14;
      font-weight: 700;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px rgba(245,158,11,0.35), 0 2px 8px rgba(0,0,0,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      opacity: 0.93;
      transform: translateY(-1px);
      box-shadow: 0 0 36px rgba(245,158,11,0.55), 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Ghost button ───────────────────────────────────────────── */
    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-md);
      color: var(--text-2);
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      color: var(--text-1);
      border-color: rgba(245,158,11,0.35);
    }
    .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Success button ─────────────────────────────────────────── */
    .btn-success {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: var(--success-hi);
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-success:hover:not(:disabled) {
      background: rgba(16,185,129,0.2);
      box-shadow: 0 0 20px rgba(16,185,129,0.22);
    }
    .btn-success:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Nav item ───────────────────────────────────────────────── */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      color: #8888aa;
      cursor: pointer;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.12s, color 0.12s;
      position: relative;
    }
    .nav-item:hover   { background: rgba(255,255,255,0.04); color: #ccccdd; }
    .nav-item.active  { background: rgba(245,158,11,0.09); color: #f59e0b; font-weight: 600; }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 18px;
      border-radius: 0 3px 3px 0;
      background: linear-gradient(to bottom, #d97706, #f59e0b);
    }

    /* ── Terminal ───────────────────────────────────────────────── */
    .terminal {
      background: #050508;
      border: 1px solid #1a1a2e;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
    }
    .terminal-header {
      background: #08080f;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .terminal-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .terminal-body {
      padding: 14px 16px;
      font-family: 'SF Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11.5px;
      line-height: 1.7;
      color: #7fff7f;
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .terminal-label { color: #f59e0b; }
    .terminal-dim   { color: rgba(127,255,127,0.3); }
    .terminal-muted { color: rgba(136,136,170,0.45); }

    /* ── Stat card ──────────────────────────────────────────────── */
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid rgba(245,158,11,0.22);
      border-radius: 14px;
      box-shadow: 0 0 40px rgba(245,158,11,0.07), inset 0 0 24px rgba(245,158,11,0.03);
    }

    /* ── Prose ──────────────────────────────────────────────────── */
    .prose-dark {
      font-size: 13.5px;
      line-height: 1.75;
      color: #c8c8e0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Text gradients ─────────────────────────────────────────── */
    .text-grad {
      background: linear-gradient(135deg, #ffffff 0%, #8888aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-grad-amber {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── VS chip ────────────────────────────────────────────────── */
    .vs-chip {
      background: var(--bg-raised);
      border: 1px solid var(--border-md);
      border-radius: 9999px;
      color: var(--text-3);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      letter-spacing: 0.08em;
    }

    /* ── Section label ──────────────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    /* ── Tags ───────────────────────────────────────────────────── */
    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 9999px;
      white-space: nowrap;
    }
    .tag-amber  { background: rgba(245,158,11,0.12); color: #f59e0b;  border: 1px solid rgba(245,158,11,0.25); }
    .tag-purple { background: rgba(124,58,237,0.12); color: #a855f7;  border: 1px solid rgba(124,58,237,0.22); }
    .tag-blue   { background: rgba(99,102,241,0.12);  color: #818cf8;  border: 1px solid rgba(99,102,241,0.2); }
    .tag-gray   { background: rgba(136,136,170,0.1);  color: #8888aa;  border: 1px solid rgba(136,136,170,0.18); }
    .tag-green  { background: rgba(16,185,129,0.11);  color: #34d399;  border: 1px solid rgba(16,185,129,0.22); }
    .tag-yellow { background: rgba(251,191,36,0.1);   color: #fbbf24;  border: 1px solid rgba(251,191,36,0.2); }
    .tag-red    { background: rgba(248,113,113,0.1);  color: #f87171;  border: 1px solid rgba(248,113,113,0.2); }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react,typescript" src="./src/api/client.ts"></script>
  <script type="text/babel" data-presets="react,typescript" src="./src/pages/Episodes.tsx"></script>
  <script type="text/babel" data-presets="react,typescript" src="./src/pages/Learnings.tsx"></script>
  <script type="text/babel" data-presets="react,typescript" src="./src/pages/RetrievalTrace.tsx"></script>
  <script type="text/babel" data-presets="react,typescript" src="./src/pages/LiveDemo.tsx"></script>
  <script type="text/babel" data-presets="react,typescript" src="./src/pages/Research.tsx"></script>
  <script type="text/babel" data-presets="react,typescript" src="./src/App.tsx"></script>
</body>
</html>
